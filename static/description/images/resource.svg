<svg width="60" height="64" viewBox="0 0 60 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Resource browsing illustration: person selecting a meeting room -->
  <!-- Shadow/ground -->
  <ellipse cx="30" cy="60" rx="24" ry="3" fill="#C1DBF6" opacity="0.5"/>
  <!-- Main building structure -->
  <rect x="2" y="16" width="30" height="40" rx="3" fill="#C1DBF6" stroke="#374874" stroke-width="1.5"/>
  <!-- Building roof/header -->
  <rect x="2" y="16" width="30" height="9" rx="3" fill="#374874"/>
  <rect x="2" y="22" width="30" height="3" fill="#374874"/>
  <!-- Windows row 1 -->
  <rect x="6" y="29" width="5" height="5" rx="1" fill="white" stroke="#374874" stroke-width="0.8"/>
  <rect x="14" y="29" width="5" height="5" rx="1" fill="white" stroke="#374874" stroke-width="0.8"/>
  <rect x="22" y="29" width="5" height="5" rx="1" fill="white" stroke="#374874" stroke-width="0.8"/>
  <!-- Windows row 2 - one highlighted as selected room -->
  <rect x="6" y="38" width="5" height="5" rx="1" fill="white" stroke="#374874" stroke-width="0.8"/>
  <rect x="14" y="38" width="5" height="5" rx="1" fill="#FBDBD0" stroke="#374874" stroke-width="1.2"/>
  <rect x="22" y="38" width="5" height="5" rx="1" fill="white" stroke="#374874" stroke-width="0.8"/>
  <!-- Door -->
  <rect x="12" y="48" width="8" height="8" rx="1.5" fill="#FBDBD0" stroke="#374874" stroke-width="1"/>
  <circle cx="18.5" cy="52" r="0.8" fill="#374874"/>
  <!-- Selection indicator on highlighted room -->
  <circle cx="16.5" cy="36" r="3" fill="#374874"/>
  <path d="M15 36 L16 37 L18.5 34.5" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Person figure browsing -->
  <!-- Head -->
  <circle cx="46" cy="20" r="5" fill="#FBDBD0" stroke="#374874" stroke-width="1.2"/>
  <!-- Hair (short style) -->
  <path d="M41.5 18 C41.5 14.5 44 13 46 13 C48 13 50.5 14.5 50.5 18" stroke="#374874" stroke-width="1.5" fill="#374874" opacity="0.7"/>
  <!-- Body/torso -->
  <path d="M46 25 L46 40" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms - one pointing at building -->
  <path d="M46 29 L36 33" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M46 29 L52 32" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hand pointing -->
  <circle cx="35" cy="33.5" r="1.5" fill="#FBDBD0" stroke="#374874" stroke-width="0.8"/>
  <!-- Tablet/clipboard in other hand -->
  <rect x="51" y="30" width="6" height="8" rx="1" fill="white" stroke="#374874" stroke-width="1"/>
  <line x1="52.5" y1="32.5" x2="55.5" y2="32.5" stroke="#374874" stroke-width="0.5" opacity="0.5"/>
  <line x1="52.5" y1="34.5" x2="55.5" y2="34.5" stroke="#374874" stroke-width="0.5" opacity="0.5"/>
  <line x1="52.5" y1="36.5" x2="54.5" y2="36.5" stroke="#374874" stroke-width="0.5" opacity="0.5"/>
  <!-- Legs -->
  <path d="M46 40 L42 52" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M46 40 L50 52" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M42 52 L40 53" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 52 L52 53" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Search/magnifier icon floating -->
  <circle cx="8" cy="10" r="4" fill="white" stroke="#374874" stroke-width="1.2"/>
  <line x1="11" y1="13" x2="13" y2="15" stroke="#374874" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="8" cy="10" r="1.5" fill="none" stroke="#374874" stroke-width="0.6"/>
</svg>
