<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#875A7B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#68456B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="15" fill="url(#bgGrad)"/>

  <!-- Calendar base -->
  <rect x="15" y="25" width="70" height="55" rx="5" fill="white" opacity="0.95"/>

  <!-- Calendar header -->
  <rect x="15" y="25" width="70" height="15" rx="5" fill="#E8E8E8"/>
  <rect x="15" y="35" width="70" height="5" fill="#E8E8E8"/>

  <!-- Calendar rings -->
  <rect x="28" y="18" width="4" height="12" rx="2" fill="#555"/>
  <rect x="48" y="18" width="4" height="12" rx="2" fill="#555"/>
  <rect x="68" y="18" width="4" height="12" rx="2" fill="#555"/>

  <!-- Time slots -->
  <rect x="22" y="48" width="18" height="8" rx="2" fill="#28a745"/>
  <rect x="42" y="48" width="18" height="8" rx="2" fill="#28a745"/>
  <rect x="62" y="48" width="18" height="8" rx="2" fill="#E0E0E0"/>

  <rect x="22" y="60" width="18" height="8" rx="2" fill="#E0E0E0"/>
  <rect x="42" y="60" width="18" height="8" rx="2" fill="#17a2b8"/>
  <rect x="62" y="60" width="18" height="8" rx="2" fill="#28a745"/>

  <!-- Checkmark for booking -->
  <path d="M 48 52 L 51 55 L 57 49" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
